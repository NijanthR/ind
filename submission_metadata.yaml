# Redrob Hackathon — Submission Metadata
#
# Fill in your team details before uploading. This file mirrors the challenge
# template and matches the offline-only ranker in this workspace.

# ============================================================================
# Team identity
# ============================================================================
team_name: "your-team-name-here"

primary_contact:
  name: "Full Name"
  email: "primary@example.com"
  phone: "+91-XXXXXXXXXX"

team_members:
  - name: "Member 1 Full Name"
    email: "member1@example.com"
    role: "Team Lead"

# ============================================================================
# Code and reproducibility
# ============================================================================
github_repo: "https://github.com/YOUR_USERNAME/YOUR_REPO"
sandbox_link: "https://huggingface.co/spaces/YOUR_USERNAME/redrob-ranker"
reproduce_command: "python rank.py --dataset-root \"./[PUB] India_runs_data_and_ai_challenge/India_runs_data_and_ai_challenge\""

# ============================================================================
# Compute environment
# ============================================================================
compute:
  platform: "Windows 11 laptop"
  cpu_cores: 8
  ram_gb: 16
  python_version: "3.12.7"
  os: "Windows 11"
  uses_gpu_for_inference: false
  has_network_during_ranking: false
  pre_computation_required: false
  pre_computation_time_minutes: 0

# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "GitHub Copilot"

ai_usage_summary: |
  Used GitHub Copilot for code generation, refactoring, and validation support.
  No candidate data was sent to an external LLM service during ranking.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Offline-first candidate ranker with deterministic scoring. The pipeline parses
  the job description and candidate records, applies cheap dataset-wide
  prefiltering, then scores shortlisted candidates using structured heuristics
  plus a fallback semantic similarity layer that works without external APIs.
  The output includes ranked candidates, concise reasoning, and an HTML report.

# ============================================================================
# Declarations
# ============================================================================
declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: false
  reproduction_tested: true